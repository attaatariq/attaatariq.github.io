<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>403 Forbidden</title>
    <link rel="shortcut icon" href="../images/favicon.png"/>
    <style>
      :root{--text-primary:#00a78e;--text-secondary:#666;--bg:#f4f4f4;--card:#fff;--accent:#00a78e;--border:#e5e5e5}*{margin:0;padding:0;box-sizing:border-box;font-family:"Open Sans",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}body{background:var(--bg);color:var(--text-primary);height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.container{text-align:center;background:var(--card);padding:60px 40px;border:1px solid var(--border);border-radius:14px;max-width:520px;width:100%;box-shadow:0 10px 30px rgba(0,0,0,.05)}.code{font-size:110px;font-weight:800;letter-spacing:-2px;line-height:1;margin-bottom:10px}.title{font-size:28px;font-weight:600;margin-bottom:14px}.message{font-size:16px;color:var(--text-secondary);line-height:1.6;margin-bottom:30px}.btn{display:inline-block;padding:12px 20px;border:1px solid var(--accent);color:#fff;background:var(--accent);text-decoration:none;border-radius:8px;font-size:14px;transition:.2s}.btn:hover{background:transparent;color:var(--accent)}@media(max-width:480px){.container{padding:40px 20px}.code{font-size:80px}}
    </style>
  </head>
  <body>
    <div class="container">
      <div class="code">403</div>
      <div class="title">Access Forbidden</div>
      <div class="message">You do not have permission to access this resource on this server. If you believe this is an error, please contact the administrator.</div>
      <a class="btn" href="/">Return to Home</a>
    </div>
  </body>
</html>
